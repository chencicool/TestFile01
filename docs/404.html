<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 页面不存在</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding-top: 120px;
        }
        h1 {
            font-size: 80px;
            color: #ff4444;
        }
        p {
            font-size: 20px;
            margin: 15px 0 30px;
            color: #555;
        }
        a {
            padding: 12px 28px;
            background-color: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 18px;
        }
        a:hover {
            background-color: #2ea043;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>抱歉，你访问的页面不存在</p>
    <p>链接失效、路径输入错误或页面已被删除</p>
    <a href="./index.html">返回网站首页</a>
</body>
</html>
